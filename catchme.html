<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>r4yane.e | Fluid Simulation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none;
        }
        canvas { display: block; }

        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 1s ease, visibility 1s ease;
        }

        #intro-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .intro-title {
            font-size: 24px;
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInUp 1s ease forwards;
            margin-bottom: 20px;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .intro-credit {
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeInUp 1s ease 0.5s forwards;
            color: rgba(255, 255, 255, 0.7);
        }

        .intro-name {
            font-size: 32px;
            font-weight: bold;
            margin-top: 10px;
            opacity: 0;
            animation: glitch 0.5s ease 1.5s forwards;
            color: white;
        }

        @keyframes fadeInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes glitch {
            0% { opacity: 0; transform: translate(0); }
            20% { opacity: 1; transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); opacity: 1; }
        }

        #toggle-btn {
            position: absolute;
            top: 20px; right: 20px;
            width: 40px; height: 40px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            z-index: 101;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        #toggle-btn:hover { background: rgba(0, 255, 255, 0.2); border-color: #00ffff; }
        #toggle-btn svg { width: 20px; height: 20px; fill: white; transition: transform 0.5s ease; }
        body.panel-closed #toggle-btn svg { transform: rotate(90deg); }

        #controls {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 12px;
            color: white;
            z-index: 100;
            width: 240px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            cursor: default;
            transform: translateX(0);
            opacity: 1;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
        }
        #controls.hidden {
            transform: translateX(100%);
            opacity: 0;
            pointer-events: none;
        }

        h3 { margin: 0 0 20px 0; font-weight: 300; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; letter-spacing: 1px; margin-bottom: 8px; opacity: 0.7; text-transform: uppercase; }
        
        input[type="range"] {
            width: 100%; background: rgba(255,255,255,0.1); border-radius: 4px; height: 4px;
            -webkit-appearance: none; outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 100%; height: 30px; border-radius: 4px; cursor: pointer; background: transparent; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; }

        .checkbox-wrapper { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 8px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; opacity: 0.8; text-transform: uppercase; }
        .switch { position: relative; width: 36px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.2); transition: .3s; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #00ffff; }
        input:checked + .slider:before { transform: translateX(18px); }

        #shark-cursor { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; will-change: transform; transform-origin: 30px 20px; }

        #stats-monitor { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(0, 255, 255, 0.3); padding: 10px 15px; border-radius: 8px; color: #0f0; font-family: 'Courier New', Courier, monospace; font-size: 12px; z-index: 100; min-width: 120px; }
        .stat-row { margin: 2px 0; display: flex; justify-content: space-between; }
        .stat-label { color: rgba(255, 255, 255, 0.6); }
        .stat-value { font-weight: bold; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="intro-title">Fluid Simulation</div>
        <div class="intro-credit">Designed and Coded by</div>
        <div class="intro-name">r4yane.e</div>
    </div>

    <button id="toggle-btn" title="Toggle Settings">
        <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
    </button>

    <div id="shark-cursor">
        <svg width="60" height="40" viewBox="0 0 60 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs><filter id="glow"><feGaussianBlur stdDeviation="1" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
            <path d="M0 20 C5 20, 15 16, 25 16 L45 16 L52 10 L55 16 L58 20 L55 24 L52 30 L45 24 L25 24 C15 24, 5 20, 0 20 Z" fill="#00ffff" filter="url(#glow)"/>
            <path d="M52 10 L58 20 L52 14 Z" fill="white" opacity="0.6"/>
            <path d="M25 16 L30 4 L38 16 Z" fill="#00ffff"/>
            <path d="M25 24 L30 32 L38 24 Z" fill="#00ffff" opacity="0.8"/>
            <circle cx="12" cy="20" r="1.5" fill="white"/>
            <line x1="18" y1="18" x2="18" y2="22" stroke="black" stroke-width="0.5" opacity="0.5"/>
            <line x1="20" y1="18" x2="20" y2="22" stroke="black" stroke-width="0.5" opacity="0.5"/>
        </svg>
    </div>

    <div id="stats-monitor">
        <div class="stat-row"><span class="stat-label">FPS:</span><span id="fpsDisplay" class="stat-value">--</span></div>
        <div class="stat-row"><span class="stat-label">RAM:</span><span id="ramDisplay" class="stat-value">-- MB</span></div>
    </div>

    <div id="controls">
        <h3>Control Panel</h3>
        <div class="control-group"><label>Particle Count <span id="countVal">800</span></label><input type="range" id="countSlider" min="100" max="2000" value="800"></div>
        <div class="control-group"><label>Flow Speed <span id="speedVal">1.0x</span></label><input type="range" id="speedSlider" min="1" max="30" value="10"></div>
        <div class="control-group"><label>Background Color</label><input type="color" id="bgColorPicker" value="#050505"></div>
        <div class="control-group"><label>Neon Color</label><input type="color" id="neonColorPicker" value="#00ffff"></div>
        <div class="control-group"><label>Line Brightness <span id="brightnessVal">70%</span></label><input type="range" id="brightnessSlider" min="10" max="100" value="70"></div>
        <div class="control-group"><label>Glow Size <span id="glowVal">3</span></label><input type="range" id="glowSlider" min="1" max="8" value="3"></div>
        <div class="checkbox-wrapper" onclick="document.getElementById('multiCheck').click()"><label>Multicolor Mode</label><label class="switch"><input type="checkbox" id="multiCheck"><span class="slider"></span></label></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const introScreen = document.getElementById('intro-screen');
        window.onload = () => {
            setTimeout(() => {
                introScreen.classList.add('hidden');
            }, 3000);
        };

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let mouse = { x: null, y: null, px: null, py: null };
        let time = 0;

        let bgColorRGB = { r: 5, g: 5, b: 5 }; 
        let neonColorHex = '#00ffff';
        let isMulticolor = false;
        let brightness = 70; 
        let glowSize = 3; 
        let particleCount = 800;
        let speedMultiplier = 1.0;
        const trailFade = 0.05; 

        const toggleBtn = document.getElementById('toggle-btn');
        const controlsPanel = document.getElementById('controls');
        toggleBtn.addEventListener('click', () => { controlsPanel.classList.toggle('hidden'); });

        const shark = document.getElementById('shark-cursor');
        let currentAngle = 0;
        let targetAngle = 0;

        function updateShark(x, y) {
            shark.style.left = (x - 30) + "px";
            shark.style.top = (y - 20) + "px";
            if (mouse.px !== null && mouse.py !== null) {
                const dx = x - mouse.px;
                const dy = y - mouse.py;
                if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) targetAngle = Math.atan2(dy, dx);
            }
            let diff = targetAngle - currentAngle;
            while (diff < -Math.PI) diff += 2 * Math.PI;
            while (diff > Math.PI) diff -= 2 * Math.PI;
            currentAngle += diff * 0.15;
            shark.style.transform = `rotate(${currentAngle}rad)`;
        }

        let frameCount = 0; let lastFpsUpdate = 0;
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        function hexToRgb(hex) { var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex); return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null; }

        class Particle {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * width; this.y = Math.random() * height; this.vx = 0; this.vy = 0; }
            update() {
                const angle = (Math.sin(this.x * 0.003 + time) + Math.cos(this.y * 0.003 + time)) * 2;
                this.vx += Math.cos(angle) * 0.1 * speedMultiplier;
                this.vy += Math.sin(angle) * 0.1 * speedMultiplier;
                if (mouse.x !== null) { const dx = mouse.x - this.x; const dy = mouse.y - this.y; const dist = Math.sqrt(dx * dx + dy * dy); if (dist < 200) { const force = (200 - dist) / 200; this.vx += dy * force * 0.02 * speedMultiplier; this.vy -= dx * force * 0.02 * speedMultiplier; } }
                this.vx *= 0.96; this.vy *= 0.96; this.x += this.vx; this.y += this.vy;
                if (this.x < 0) this.x = width; if (this.x > width) this.x = 0; if (this.y < 0) this.y = height; if (this.y > height) this.y = 0;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
                const alpha = brightness / 100;
                if (isMulticolor) { const hue = (Math.atan2(this.vy, this.vx) * 180 / Math.PI + 360) % 360; ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${alpha})`; } 
                else { const c = hexToRgb(neonColorHex); ctx.fillStyle = `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha})`; }
                ctx.fill();
            }
        }

        function adjustParticles(newCount) { const diff = newCount - particles.length; if (diff > 0) { for (let i = 0; i < diff; i++) particles.push(new Particle()); } else if (diff < 0) { particles.splice(newCount); } }
        adjustParticles(particleCount);

        function animate(timestamp) {
            time += 0.01;
            frameCount++;
            if (timestamp - lastFpsUpdate >= 500) {
                const fps = Math.round((frameCount * 1000) / (timestamp - lastFpsUpdate));
                document.getElementById('fpsDisplay').innerText = fps;
                if (performance.memory) { document.getElementById('ramDisplay').innerText = (performance.memory.usedJSHeapSize / 1048576).toFixed(2) + " MB"; } else { document.getElementById('ramDisplay').innerText = "N/A"; }
                frameCount = 0; lastFpsUpdate = timestamp;
            }
            ctx.fillStyle = `rgba(${bgColorRGB.r}, ${bgColorRGB.g}, ${bgColorRGB.b}, ${trailFade})`;
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < particles.length; i++) { particles[i].update(); particles[i].draw(); }
            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(animate);
        }

        document.getElementById('bgColorPicker').addEventListener('input', (e) => { bgColorRGB = hexToRgb(e.target.value); });
        document.getElementById('neonColorPicker').addEventListener('input', (e) => { neonColorHex = e.target.value; });
        document.getElementById('multiCheck').addEventListener('change', (e) => { isMulticolor = e.target.checked; });
        document.getElementById('brightnessSlider').addEventListener('input', (e) => { brightness = parseInt(e.target.value); document.getElementById('brightnessVal').innerText = brightness + '%'; });
        document.getElementById('glowSlider').addEventListener('input', (e) => { glowSize = parseInt(e.target.value); document.getElementById('glowVal').innerText = glowSize; });
        document.getElementById('countSlider').addEventListener('input', (e) => { particleCount = parseInt(e.target.value); document.getElementById('countVal').innerText = particleCount; adjustParticles(particleCount); });
        document.getElementById('speedSlider').addEventListener('input', (e) => { speedMultiplier = parseInt(e.target.value) / 10; document.getElementById('speedVal').innerText = speedMultiplier.toFixed(1) + 'x'; });

        window.addEventListener('mousemove', e => { mouse.px = mouse.x; mouse.py = mouse.y; mouse.x = e.clientX; mouse.y = e.clientY; updateShark(mouse.x, mouse.y); });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; shark.style.opacity = 0; });
        window.addEventListener('mouseenter', () => { shark.style.opacity = 1; });

        animate(0);
    </script>
</body>
</html>
